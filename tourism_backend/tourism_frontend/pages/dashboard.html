<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Tourism Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<header class="main-header">
    <h1>Explore Sri Lanka</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search destinations (e.g., Ella, Kandy)...">
        <button id="searchBtn">Search</button>
    </div>
</header>

<main class="container">
    <section id="recommendationWrapper" class="hidden">
        <h2 class="section-title">✨ Recommended For You</h2>
        <div id="recommendationContainer" class="tour-grid"></div>
    </section>

    <section id="allToursWrapper">
        <h2 class="section-title">🔥 Trending Packages</h2>
        <div id="tourContainer" class="tour-grid"></div>
    </section>
</main>

<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/tourist.js"></script>
</body>
</html>
