<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile - Smart Tourism</title>
    <link rel="stylesheet" href="../css/dashboard.css"> <style>
    .profile-container { padding: 40px; max-width: 1000px; margin: auto; }
    .history-section { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .status-confirmed { color: green; font-weight: bold; }
    .status-cancelled { color: red; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
    /* Modal Overlay */
    .modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
        z-index: 1000; transition: 0.3s;
    }

    /* Modal Box */
    .modal-content {
        background: white; padding: 30px; border-radius: 15px;
        width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .hidden { display: none !important; }

    /* Buttons inside Modal */
    .modal-btns { margin-top: 20px; display: flex; gap: 10px; }

    .btn-review { background: #ffc107; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
    .btn-receipt { background: #17a2b8; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; margin-right: 5px; }

    textarea { width: 100%; height: 80px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; padding: 10px; }
    select { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; }
</style>
</head>
<body>

<nav class="main-header">
    <h1>My Travel Activity</h1>
    <a href="dashboard.html" style="color: white;">Back to Dashboard</a>
</nav>

<div class="profile-container">
    <section class="history-section">
        <h2>📅 My Bookings</h2>
        <table>
            <thead>
            <tr>
                <th>Tour Package</th>
                <th>People</th>
                <th>Total Amount</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody id="booking-table-body">
            </tbody>
        </table>
    </section>

    <section class="history-section">
        <h2>🔍 Recent Searches</h2>
        <p style="font-size: 13px; color: #666;">We use these to personalize your recommendations.</p>
        <ul id="search-history-list">
        </ul>
    </section>
</div>
<div id="reviewModal" class="modal hidden">
    <div class="modal-content">
        <h3 id="reviewTourTitle">Rate Tour</h3>
        <input type="hidden" id="reviewTourId">

        <label>Rating:</label>
        <select id="ratingSelect">
            <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
            <option value="4">⭐⭐⭐⭐ (Good)</option>
            <option value="3">⭐⭐⭐ (Average)</option>
            <option value="2">⭐⭐ (Poor)</option>
            <option value="1">⭐ (Terrible)</option>
        </select>

        <label>Your Comment:</label>
        <textarea id="commentText" placeholder="Tell us about your trip..."></textarea>

        <div class="modal-btns">
            <button onclick="submitReview()" class="btn-save">Submit Review</button>
            <button onclick="closeModal()" class="btn-logout">Cancel</button>
        </div>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/profile.js"></script>
</body>
</html>
