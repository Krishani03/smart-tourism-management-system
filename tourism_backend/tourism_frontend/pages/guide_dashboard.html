<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guide Dashboard - Smart Tourism</title>
    <link rel="stylesheet" href="../css/guide.css">
</head>
<body>

<div class="guide-header">
    <div>
        <h1>Guide Control Center 🧭</h1>
        <p>Welcome, <span id="guide-name">Guide</span></p>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
</div>

<div class="container">
    <section>
        <h2>My Assigned Tour Packages</h2>
        <div id="guide-tours-container" class="tour-grid">
            <p>Loading your assignments...</p>
        </div>
    </section>

    <section id="traveler-section" class="hidden" style="margin-top: 40px;">
        <h2 id="traveler-title" style="color: #007bff;">📋 Passenger List</h2>
        <div id="travelers-container">
        </div>
    </section>
</div>

<script src="../js/app.js"></script>
<script src="../js/guide_dashboard.js"></script>
</body>
</html>
