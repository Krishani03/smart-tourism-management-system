<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Tourism - Register</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; background-color: #f4f7f6; padding-top: 50px; }
    .register-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
    h2 { text-align: center; color: #333; }
    input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background-color: #218838; }
    .footer-link { text-align: center; margin-top: 15px; font-size: 14px; }
  </style>
</head>
<body>
<div class="register-container">
  <h2>Create Account</h2>
  <input type="text" id="reg-username" placeholder="Username (Email)">
  <input type="password" id="reg-password" placeholder="Password">

  <label for="reg-role">I am a:</label>
  <select id="reg-role">
    <option value="TOURIST">Tourist</option>
    <option value="ADMIN">Administrator</option>
    <option value="GUIDE">Tour Guide</option>
  </select>

  <button onclick="submitRegistration()">Sign Up</button>
  <div class="footer-link">
    Already have an account? <a href="login.html">Login here</a>
  </div>
  <p id="reg-msg" style="text-align: center; color: red;"></p>
</div>

<script src="app.js"></script>
</body>
</html>
