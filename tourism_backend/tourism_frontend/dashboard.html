<!DOCTYPE html>
<html lang="en">
<head>
    <title>Available Tours</title>
    <style>
        .tour-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        .price { color: green; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
<h2>Our Special Tour Packages</h2>
<div id="tour-container" class="tour-grid">
</div>

<script>
    // When the page loads, fetch the tours
    window.onload = async () => {
        const response = await fetch('http://localhost:8080/api/v1/tours');
        const tours = await response.json();

        const container = document.getElementById('tour-container');
        tours.forEach(tour => {
            container.innerHTML += `
                    <div class="card">
                        <h3>${tour.title}</h3>
                        <p>${tour.description}</p>
                        <p class="price">LKR ${tour.currentPrice}</p>
                        <button onclick="bookTour(${tour.id})">Book Now</button>
                    </div>
                `;
        });
    };

    async function bookTour(id) {
        const token = localStorage.getItem('token');
        if(!token) {
            alert("Please login first!");
            window.location.href = "login.html";
            return;
        }

        const response = await fetch('http://localhost:8080/api/v1/bookings', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ tourId: id, people: 1 })
        });

        if(response.ok) alert("Booking Successful!");
        else alert("Booking Failed. Check your permissions.");
    }
</script>
</body>
</html>
